<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="description" content="Live viewer for Pawsitive Detectives' engineering roadmap (docs/TASK_BOARD.md)." />
  <title>Pawsitive Detectives — Task Board</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png" />
  <style>
    :root {
      --bg: #fff7ed;
      --card: #fff;
      --card-border: #fde2b3;
      --ink: #4a2c14;
      --ink-muted: #92400e;
      --ink-faint: #b45309;
      --accent: #f59e0b;
      --code-bg: #fef3c7;
      --tag-bg: #fff1d6;
      --risk-low-bg: #dcfce7; --risk-low-ink: #15803d;
      --risk-medium-bg: #fef3c7; --risk-medium-ink: #92400e;
      --risk-medium-high-bg: #fee2c7; --risk-medium-high-ink: #9a3412;
      --risk-high-bg: #fee2e2; --risk-high-ink: #b91c1c;
      --effort-bg: #f3f4f6; --effort-ink: #4b5563;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1712;
        --card: #2a1f18;
        --card-border: #4a3626;
        --ink: #f3e8d8;
        --ink-muted: #fde2b3;
        --ink-faint: #d6a35c;
        --accent: #e2a33f;
        --code-bg: #241a13;
        --tag-bg: #241a13;
        --risk-low-bg: #16301f; --risk-low-ink: #86efac;
        --risk-medium-bg: #332a17; --risk-medium-ink: #fde2b3;
        --risk-medium-high-bg: #3a2410; --risk-medium-high-ink: #fdba74;
        --risk-high-bg: #3a1c1c; --risk-high-ink: #fca5a5;
        --effort-bg: #241a13; --effort-ink: #d6a35c;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Comic Sans MS', 'Segoe UI', Verdana, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    header.hero {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      color: #fff;
      border-radius: 20px;
      padding: 20px 24px;
      box-shadow: 0 6px 0 #b45309;
      margin-bottom: 20px;
    }

    header.hero h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }

    header.hero p {
      margin: 0;
      opacity: 0.95;
    }

    .hero-links {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero-links a, .hero-links button {
      background: rgba(255, 255, 255, 0.9);
      color: #92400e;
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
    }

    #status {
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--ink-faint);
    }

    #status.error {
      background: var(--risk-high-bg);
      color: var(--risk-high-ink);
      padding: 12px 16px;
      border-radius: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }

    .filter-btn {
      border: 2px solid var(--card-border);
      background: var(--card);
      color: var(--ink-muted);
      border-radius: 999px;
      padding: 6px 14px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
    }

    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    #search {
      flex: 1;
      min-width: 160px;
      border: 2px solid var(--card-border);
      border-radius: 999px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.85rem;
      background: var(--card);
      color: var(--ink);
    }

    .bucket {
      margin-bottom: 28px;
    }

    .bucket-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }

    .bucket-head h2 {
      font-size: 1.2rem;
      margin: 0;
    }

    .bucket-count {
      font-size: 0.8rem;
      color: var(--ink-faint);
    }

    .bucket-empty {
      background: var(--card);
      border: 2px dashed var(--card-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--ink-faint);
      font-size: 0.9rem;
    }

    .group-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-faint);
      margin: 16px 0 8px;
      font-weight: bold;
    }

    .task-card {
      background: var(--card);
      border: 2px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 12px;
    }

    .task-card h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .task-card p {
      margin: 8px 0;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .task-card code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    .task-steps {
      background: var(--code-bg);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      margin: 8px 0;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .badge.effort { background: var(--effort-bg); color: var(--effort-ink); }
    .badge.risk-low { background: var(--risk-low-bg); color: var(--risk-low-ink); }
    .badge.risk-medium { background: var(--risk-medium-bg); color: var(--risk-medium-ink); }
    .badge.risk-medium-high { background: var(--risk-medium-high-bg); color: var(--risk-medium-high-ink); }
    .badge.risk-high { background: var(--risk-high-bg); color: var(--risk-high-ink); }

    .risk-reason {
      font-size: 0.82rem;
      color: var(--ink-faint);
      font-style: italic;
    }

    .done-when {
      background: var(--tag-bg);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .branch-line code {
      font-weight: bold;
    }

    #hold-toggle-wrap {
      text-align: center;
      margin: -8px 0 20px;
    }

    #hold-toggle {
      background: none;
      border: none;
      color: var(--ink-faint);
      text-decoration: underline;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }

    footer.note {
      text-align: center;
      color: var(--ink-faint);
      font-size: 0.8rem;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>📋 Task Board</h1>
      <p>Live view of <code style="background:rgba(255,255,255,.3);border-radius:4px;padding:0 4px;">docs/TASK_BOARD.md</code> — always reflects whatever is currently on this branch.</p>
      <div class="hero-links">
        <a href="index.html">← Back to the game</a>
        <a href="docs/TASK_BOARD.md" target="_blank" rel="noopener">View raw markdown</a>
        <button onclick="loadBoard()">🔄 Refresh</button>
      </div>
    </header>

    <div id="status">Loading…</div>
    <div id="controls" class="controls" style="display:none">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="🔴 NOW">🔴 NOW</button>
      <button class="filter-btn" data-filter="🟡 NEXT">🟡 NEXT</button>
      <button class="filter-btn" data-filter="🟢 LATER">🟢 LATER</button>
      <button class="filter-btn" data-filter="⏸️ ON HOLD">⏸️ ON HOLD</button>
      <input id="search" type="search" placeholder="Search tasks…" />
    </div>
    <div id="board"></div>
    <footer class="note">This page never caches the board — every load/refresh fetches the file fresh.</footer>
  </div>

  <script>
    const BUCKET_NAMES = ['🔴 NOW', '🟡 NEXT', '🟢 LATER', '⏸️ ON HOLD'];
    let currentFilter = 'all';
    let currentSearch = '';
    let parsedBuckets = [];

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderInline(text) {
      let out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }

    function parseBoard(md) {
      const lines = md.split('\n');
      const buckets = [];
      let currentBucket = null;
      let currentGroup = null;
      let currentTask = null;

      function flushTask() {
        if (currentTask && currentBucket) {
          currentTask.body = currentTask.bodyLines.join('\n').trim();
          delete currentTask.bodyLines;
          currentBucket.tasks.push(currentTask);
        }
        currentTask = null;
      }

      for (const line of lines) {
        const h2 = line.match(/^## (.+)$/);
        const h3 = line.match(/^### (.+)$/);
        if (h2) {
          const heading = h2[1].trim();
          if (BUCKET_NAMES.includes(heading)) {
            flushTask();
            currentBucket = { name: heading, tasks: [] };
            buckets.push(currentBucket);
            currentGroup = null;
            continue;
          }
          flushTask();
          const title = heading.replace(/\s*—\s*TODO\s*$/, '');
          currentTask = { title, group: currentGroup, bodyLines: [] };
          continue;
        }
        if (h3) {
          flushTask();
          currentGroup = h3[1].trim();
          continue;
        }
        if (currentTask) currentTask.bodyLines.push(line);
      }
      flushTask();
      return buckets;
    }

    function splitBlocks(body) {
      const lines = body.split('\n');
      const blocks = [];
      let buf = [];
      let inFence = false;
      for (const line of lines) {
        if (line.trim().startsWith('```')) {
          if (inFence) {
            blocks.push({ type: 'code', text: buf.join('\n') });
            buf = [];
            inFence = false;
          } else {
            if (buf.length) { blocks.push({ type: 'text', text: buf.join('\n').trim() }); buf = []; }
            inFence = true;
          }
          continue;
        }
        if (inFence) { buf.push(line); continue; }
        if (line.trim() === '') {
          if (buf.length) { blocks.push({ type: 'text', text: buf.join('\n').trim() }); buf = []; }
          continue;
        }
        buf.push(line);
      }
      if (buf.length) blocks.push({ type: inFence ? 'code' : 'text', text: buf.join('\n').trim() });
      return blocks.filter(b => b.text);
    }

    function riskClass(risk) {
      return 'risk-' + risk.toLowerCase().replace(/\s+/g, '-');
    }

    function renderTaskBody(body) {
      const effortRiskRegex = /^\*\*Effort:\*\*\s*(.+?)\s*·\s*\*\*Risk:\*\*\s*([^—]+?)(\s*—\s*(.*))?$/s;
      let html = '';
      for (const block of splitBlocks(body)) {
        if (block.type === 'code') {
          html += `<pre class="task-steps">${escapeHtml(block.text)}</pre>`;
          continue;
        }
        const erMatch = block.text.match(effortRiskRegex);
        if (erMatch) {
          const effort = erMatch[1].trim();
          const risk = erMatch[2].trim();
          const reason = (erMatch[4] || '').trim();
          html += `<div class="badges">
            <span class="badge effort">Effort: ${escapeHtml(effort)}</span>
            <span class="badge ${riskClass(risk)}">Risk: ${escapeHtml(risk)}</span>
          </div>`;
          if (reason) html += `<p class="risk-reason">${renderInline(reason)}</p>`;
          continue;
        }
        if (/^\*\*Done when:\*\*/.test(block.text)) {
          html += `<p class="done-when">${renderInline(block.text)}</p>`;
          continue;
        }
        if (/^Branch `/.test(block.text)) {
          html += `<p class="branch-line">${renderInline(block.text)}</p>`;
          continue;
        }
        html += `<p>${renderInline(block.text)}</p>`;
      }
      return html;
    }

    function taskMatchesSearch(task, query) {
      if (!query) return true;
      const haystack = (task.title + ' ' + task.body).toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      const buckets = currentFilter === 'all' ? parsedBuckets : parsedBuckets.filter(b => b.name === currentFilter);

      buckets.forEach(bucket => {
        const visibleTasks = bucket.tasks.filter(t => taskMatchesSearch(t, currentSearch));
        const section = document.createElement('section');
        section.className = 'bucket';

        const isOnHold = bucket.name === '⏸️ ON HOLD';
        const collapsed = isOnHold && !bucket._expanded && !currentSearch;

        section.innerHTML = `
          <div class="bucket-head">
            <h2>${escapeHtml(bucket.name)}</h2>
            <span class="bucket-count">${visibleTasks.length} task${visibleTasks.length === 1 ? '' : 's'}</span>
          </div>
        `;

        if (!visibleTasks.length) {
          const empty = document.createElement('div');
          empty.className = 'bucket-empty';
          empty.textContent = bucket.tasks.length ? 'No tasks match the current search.' : 'Nothing here right now.';
          section.appendChild(empty);
          boardEl.appendChild(section);
          return;
        }

        if (collapsed) {
          const wrap = document.createElement('div');
          wrap.id = 'hold-toggle-wrap';
          const btn = document.createElement('button');
          btn.id = 'hold-toggle';
          btn.textContent = `Show ${visibleTasks.length} parked ideas →`;
          btn.onclick = () => { bucket._expanded = true; render(); };
          wrap.appendChild(btn);
          section.appendChild(wrap);
          boardEl.appendChild(section);
          return;
        }

        let lastGroup = undefined;
        visibleTasks.forEach(task => {
          if (task.group !== lastGroup) {
            const label = document.createElement('div');
            label.className = 'group-label';
            label.textContent = task.group || '';
            if (task.group) section.appendChild(label);
            lastGroup = task.group;
          }
          const card = document.createElement('div');
          card.className = 'task-card';
          card.innerHTML = `<h3>${escapeHtml(task.title)}</h3>${renderTaskBody(task.body)}`;
          section.appendChild(card);
        });

        boardEl.appendChild(section);
      });
    }

    async function loadBoard() {
      const statusEl = document.getElementById('status');
      const controlsEl = document.getElementById('controls');
      statusEl.className = '';
      statusEl.textContent = 'Loading…';
      try {
        const res = await fetch('./docs/TASK_BOARD.md', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        parsedBuckets = parseBoard(text);
        const total = parsedBuckets.reduce((sum, b) => sum + b.tasks.length, 0);
        statusEl.textContent = `Loaded ${total} tasks across ${parsedBuckets.length} buckets, just now.`;
        controlsEl.style.display = 'flex';
        render();
      } catch (err) {
        statusEl.className = 'error';
        statusEl.innerHTML = `Could not load <code>docs/TASK_BOARD.md</code> (${escapeHtml(err.message)}). ` +
          `If you opened this file directly, serve it over a local web server instead ` +
          `(e.g. <code>python3 -m http.server 8080</code> from the repo root) — browsers block this page's ` +
          `fetch on <code>file://</code>.`;
        controlsEl.style.display = 'none';
        document.getElementById('board').innerHTML = '';
      }
    }

    document.getElementById('controls').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });

    document.getElementById('search').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      render();
    });

    loadBoard();
  </script>
</body>
</html>
